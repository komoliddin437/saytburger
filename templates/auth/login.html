<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Big Burger - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:Outfit,sans-serif;background:linear-gradient(145deg,#1c1410,#2e1d14 45%,#4b2818);min-height:100vh;display:grid;place-items:center;color:#fff}
    .card{width:min(460px,92%);background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:22px}
    h1{margin:0 0 4px;font-size:34px}.sub{margin:0 0 14px;color:#f5d9c5}
    .row{display:grid;gap:8px;margin-bottom:10px}.field{display:grid;gap:6px}
    input{width:100%;padding:11px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.15);color:#fff}
    button{width:100%;padding:11px;border:0;border-radius:12px;background:linear-gradient(90deg,#e35b2b,#f39c3d);color:#fff;font-weight:700;cursor:pointer}
    a{color:#ffd8a8}
    .err{background:rgba(255,58,58,.15);border:1px solid rgba(255,58,58,.4);padding:8px;border-radius:10px;font-size:13px}
  </style>
</head>
<body>
  <form method="post" class="card">
    {% csrf_token %}
    <h1>Kirish</h1>
    <p class="sub">Big Burger akkauntingizga kiring</p>
    {% if form.non_field_errors %}<div class="err">{{ form.non_field_errors|join:", " }}</div>{% endif %}
    <div class="row">
      <div class="field"><label>Username</label>{{ form.username }}</div>
      <div class="field"><label>Parol</label>{{ form.password }}</div>
    </div>
    <button type="submit">Kirish</button>
    <p>Akkauntingiz yo'qmi? <a href="/auth/register/">Ro'yxatdan o'ting</a></p>
  </form>
</body>
</html>
