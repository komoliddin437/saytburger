<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Big Burger - Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:Outfit,sans-serif;background:linear-gradient(145deg,#14191f,#1f2a38 45%,#2f4a68);min-height:100vh;display:grid;place-items:center;color:#fff}
    .card{width:min(520px,92%);background:rgba(255,255,255,.08);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:22px}
    h1{margin:0 0 4px;font-size:34px}.sub{margin:0 0 14px;color:#d5e7ff}
    .grid{display:grid;gap:10px;grid-template-columns:1fr 1fr}
    .full{grid-column:1/-1}
    .field{display:grid;gap:6px}
    input{width:100%;padding:11px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:rgba(0,0,0,.15);color:#fff}
    button{width:100%;padding:11px;border:0;border-radius:12px;background:linear-gradient(90deg,#2a7cf6,#4ab3ff);color:#fff;font-weight:700;cursor:pointer}
    a{color:#b9deff}.help{font-size:12px;color:#c8d6e7}
    .err{background:rgba(255,58,58,.15);border:1px solid rgba(255,58,58,.4);padding:8px;border-radius:10px;font-size:13px}
  </style>
</head>
<body>
  <form method="post" class="card">
    {% csrf_token %}
    <h1>Ro'yxatdan o'tish</h1>
    <p class="sub">Oddiy foydalanuvchi akkauntini yarating</p>
    {% if form.errors %}<div class="err">Formada xato bor. Maydonlarni tekshiring.</div>{% endif %}
    <div class="grid">
      <div class="field full"><label>Username</label>{{ form.username }}</div>
      <div class="field"><label>Email</label>{{ form.email }}</div>
      <div class="field"><label>Telefon</label>{{ form.phone }}</div>
      <div class="field"><label>Parol</label>{{ form.password1 }}<span class="help">Kamida 8 belgi bo'lsin.</span></div>
      <div class="field"><label>Parolni tasdiqlang</label>{{ form.password2 }}</div>
      <div class="full"><button type="submit">Akkaunt yaratish</button></div>
    </div>
    <p>Akkauntingiz bormi? <a href="/auth/login/">Kirish</a></p>
  </form>
</body>
</html>
